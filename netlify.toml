[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' mailto:; script-src 'self' https://cdn.jsdelivr.net https://scripts.simpleanalyticscdn.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://cdn.jsdelivr.net https://*.supabase.co wss://*.supabase.co https://queue.simpleanalyticscdn.com https://graph.facebook.com https://www.facebook.com https://www.instagram.com; frame-src 'self' blob: data: https://www.facebook.com https://web.facebook.com https://www.instagram.com; worker-src 'self' blob:; media-src 'self' data: blob: https:; manifest-src 'self'"
    Permissions-Policy = "accelerometer=(), camera=(self), display-capture=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(), usb=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Permitted-Cross-Domain-Policies = "none"

[[headers]]
  for = "/langages/javascript.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src 'self' blob: data:"

[[redirects]]
  from = "/"
  to = "/landing-atelier.html"
  status = 200
  force = true

[[redirects]]
  from = "/landing-atelier"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/landing-atelier.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/app"
  to = "/app/feed.html"
  status = 302

[[redirects]]
  from = "/app/"
  to = "/app/feed.html"
  status = 302

[[redirects]]
  from = "/app/crm"
  to = "/app/crm-dashboard.html"
  status = 302

[[redirects]]
  from = "/app/crm/"
  to = "/app/crm-dashboard.html"
  status = 302

[[headers]]
  for = "/index.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/ancienne-accueil.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/cv-alexis.html"
  [headers.values]
    X-Robots-Tag = "noindex, follow"
