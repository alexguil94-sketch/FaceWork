<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Messages — FaceWork</title>
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <div class="app">
    
<header class="appbar">
  <div class="container inner">
    <a class="brand" href="feed.html" aria-label="FaceWork">
      <div class="logo" aria-hidden="true"><img src="../assets/fw-logo.png" alt=""/></div>
      <div style="line-height:1.1">
        <div style="font-size:18px; font-weight:950">FaceWork</div>
        <div style="font-size:12px; color:var(--muted); font-weight:800">Espace entreprise</div>
      </div>
    </a>

    <nav class="appnav" aria-label="Navigation application">
      <a data-app-nav href="feed.html">📰 Publications</a>
      <a data-app-nav href="channels.html"># Canaux</a>
      <a data-app-nav href="messages.html">💬 Messages</a>
      <a data-app-nav href="crm-dashboard.html" data-admin-only class="hidden">💼 CRM</a>
      <a data-app-nav href="admin.html" data-admin-only class="hidden">🛡️ Admin</a>
      <a data-app-nav href="settings.html">⚙️ Paramètres</a>
      <a data-app-nav href="../tutoriel.html">📘 Tutoriel</a>
    </nav>

    <div class="userbox">
      <button class="btn icon" data-theme-toggle title="Basculer thème">🌓</button>
      <div class="row" style="gap:10px">
        <div class="avatar" data-user-avatar>FW</div>
        <div style="display:flex; flex-direction:column; line-height:1.1">
          <div style="font-weight:950" data-user-name>Utilisateur</div>
          <div class="sub" data-user-company>Entreprise</div>
        </div>
      </div>
      <button class="btn small" data-logout title="Se déconnecter" aria-label="Se déconnecter">
        <span aria-hidden="true">↩</span>
        <span class="hide-sm">Déconnexion</span>
      </button>
    </div>
  </div>
</header>

    <main class="main">
      <div class="container">
        <h1 class="page-title">Messages</h1>
        <p class="page-sub">Conversations privées (DM) avec tes collègues.</p>

        <div class="spacer"></div>

        <section class="workbench card">
          <aside class="workbench-sidebar">
            <div class="badge">Contacts</div>
            <div class="side-title"><span>Messages directs</span></div>
            <div id="dmList" class="ch-list"></div>
            <div class="hr"></div>
            <button class="btn small" type="button" id="createDM">＋ Nouveau DM</button>
          </aside>

          <section id="dmConvo" class="workbench-main"></section>
        </section>
      </div>
    </main>
  </div>

  <div class="toast" role="status" aria-live="polite">
    <div class="t">Info</div>
    <div class="d">—</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/env.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/site.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
